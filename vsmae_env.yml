name: multi-vit
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch=2.2.*
  - torchvision=0.17.*
  - pytorch-cuda=11.8
  - setuptools
  - wheel
  - libegl
  - libgl
  - libglvnd
  - libopengl

  - pip:

      - numpy==1.24.4
      - einops
      - vit-pytorch
      - positional-encodings

      # sim stuff
      - mujoco==3.1.3
      - dm-env==1.6
      - dm-control==1.0.16
      - metaworld==3.0.0
      - gymnasium

      
      - scikit-image
      - wandb
      - glfw
      - PyOpenGL
      - opencv-python-headless<4.11
